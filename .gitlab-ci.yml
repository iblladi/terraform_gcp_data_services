image: google/cloud-sdk:alpine

stages:
  - validate
  - plan
  - apply
  - destroy

variables:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_REGION: ${REGION}
  GOOGLE_PROJECT: ${PROJECT_ID}
  GOOGLE_SERVICE_ACCOUNT: masterclass-sa-gitlab@${PROJECT_ID}.iam.gserviceaccount.com
  WORKLOAD_IDENTITY_PROVIDER: projects/${PROJECT_NUMBER}/locations/global/workloadIdentityPools/gitlab-pool/providers/gitlab-provider

before_script:
  # Install dependencies via apk
  - apk add --no-cache bash curl unzip python3 py3-pip

  # Create virtual environment
  - python3 -m venv venv
  - source venv/bin/activate

  # Install Python packages inside venv
  - pip install --upgrade pip
  - pip install google-cloud-storage

  # Install Terraform
  - rm -rf terraform               # remove any old terraform file/directory
  - curl -LO https://releases.hashicorp.com/terraform/1.6.0/terraform_1.6.0_linux_amd64.zip
  - unzip -o terraform_1.6.0_linux_amd64.zip
  - mv terraform /usr/local/bin/
  - terraform version

  # Navigate to Terraform root
  - cd $CI_PROJECT_DIR/$TF_ROOT
  - pwd
  - ls -R
  
  - cd $TF_ROOT
  - chmod +x create_backend_bucket.sh

  # Create backend bucket if not exists
  - ./create_backend_bucket.sh

  # Initialize Terraform
  - terraform init -backend-config="bucket=$TF_STATE_BUCKET"

# -----------------------------
# Terraform validate job
# -----------------------------
validate:
  stage: validate
  script:
    - terraform fmt -check
    - terraform validate

# -----------------------------
# Terraform plan job
# -----------------------------
plan:
  stage: plan
  id_tokens:
    GCP_ID_TOKEN:
      aud: ${WORKLOAD_IDENTITY_PROVIDER}
  script:
    # Generate Workload Identity creds
    - echo "$GCP_ID_TOKEN" > token.jwt
    - gcloud iam workload-identity-pools create-cred-config $WORKLOAD_IDENTITY_PROVIDER \
        --service-account=$GOOGLE_SERVICE_ACCOUNT \
        --output-file=cred.json \
        --credential-source-file=token.jwt
    - export GOOGLE_APPLICATION_CREDENTIALS=cred.json
    - gcloud config set project $GOOGLE_PROJECT

    # Run Terraform plan
    - terraform plan -out=tfplan
  artifacts:
    paths:
      - tfplan
  only:
    - merge_requests

# -----------------------------
# Terraform apply job
# -----------------------------
apply:
  stage: apply
  dependencies:
    - plan
  id_tokens:
    GCP_ID_TOKEN:
      aud: ${WORKLOAD_IDENTITY_PROVIDER}
  script:
    - echo "$GCP_ID_TOKEN" > token.jwt
    - gcloud iam workload-identity-pools create-cred-config $WORKLOAD_IDENTITY_PROVIDER \
        --service-account=$GOOGLE_SERVICE_ACCOUNT \
        --output-file=cred.json \
        --credential-source-file=token.jwt
    - export GOOGLE_APPLICATION_CREDENTIALS=cred.json
    - gcloud config set project $GOOGLE_PROJECT

    - terraform apply -auto-approve tfplan
  only:
    - main

# -----------------------------
# Terraform destroy job
# -----------------------------
destroy:
  stage: destroy
  id_tokens:
    GCP_ID_TOKEN:
      aud: ${WORKLOAD_IDENTITY_PROVIDER}
  script:
    - echo "$GCP_ID_TOKEN" > token.jwt
    - gcloud iam workload-identity-pools create-cred-config $WORKLOAD_IDENTITY_PROVIDER \
        --service-account=$GOOGLE_SERVICE_ACCOUNT \
        --output-file=cred.json \
        --credential-source-file=token.jwt
    - export GOOGLE_APPLICATION_CREDENTIALS=cred.json
    - gcloud config set project $GOOGLE_PROJECT

    - terraform destroy -auto-approve
  when: manual
  only:
    - main