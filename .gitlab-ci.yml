image: google/cloud-sdk:slim

stages:
  - validate
  - plan
  - apply
  - destroy

variables:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_ROOT: ${TF_ROOT}
  TF_STATE_BUCKET: ${TF_STATE_BUCKET}
  TF_REGION: ${REGION}
  GOOGLE_PROJECT: ${PROJECT_ID}
  GOOGLE_SERVICE_ACCOUNT: masterclass-sa-gitlab@${PROJECT_ID}.iam.gserviceaccount.com
  WORKLOAD_IDENTITY_PROVIDER: projects/${PROJECT_NUMBER}/locations/global/workloadIdentityPools/gitlab-pool/providers/gitlab-provider

id_tokens:
  GCP_ID_TOKEN:
    aud: ${WORKLOAD_IDENTITY_PROVIDER}

before_script:
  - apk add --no-cache bash curl unzip python3 py3-pip
  - pip install google-cloud-storage

  - curl -LO https://releases.hashicorp.com/terraform/1.6.0/terraform_1.6.0_linux_amd64.zip
  - unzip terraform_1.6.0_linux_amd64.zip
  - mv terraform /usr/local/bin/
  - terraform version

  - echo "$GCP_ID_TOKEN" > token.jwt

  - | 
    gcloud iam workload-identity-pools create-cred-config $WORKLOAD_IDENTITY_PROVIDER \
      --service-account=$GOOGLE_SERVICE_ACCOUNT \
      --output-file=cred.json \
      --credential-source-file=token.jwt

  - export GOOGLE_APPLICATION_CREDENTIALS=cred.json
  - gcloud config set project $GOOGLE_PROJECT

  - cd $TF_ROOT

  - chmod +x create_backend_bucket.sh $TF_STATE_BUCKET
  - ./create_backend_bucket.sh

  - terraform init -backend-config="bucket=$TF_STATE_BUCKET"

validate:
  stage: validate
  script:
    - terraform fmt -check
    - terraform validate

plan:
  stage: plan
  script:
    - terraform plan -out=tfplan
  artifacts:
    paths:
      - tfplan
  only:
    - merge_requests

apply:
  stage: apply
  dependencies:
    - plan
  script:
    - terraform apply -auto-approve tfplan
  only:
    - main

destroy:
  stage: destroy
  script:
    - terraform destroy -auto-approve
  when: manual
  only:
    - main