image: google/cloud-sdk:alpine

stages:
  - validate
  - plan
  - apply
  - destroy

variables:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_REGION: ${REGION}
  GOOGLE_PROJECT: ${PROJECT_ID}
  GOOGLE_SERVICE_ACCOUNT: masterclass-sa-gitlab@${PROJECT_ID}.iam.gserviceaccount.com
  WORKLOAD_IDENTITY_PROVIDER: projects/${PROJECT_NUMBER}/locations/global/workloadIdentityPools/gitlab-pool/providers/gitlab-provider
  TF_ROOT: terraform/envs/dev
  TF_STATE_BUCKET: terraform-state-masterclassparis

before_script:
  # -----------------------------
  # Install dependencies
  # -----------------------------
  - apk add --no-cache bash curl unzip python3 py3-pip
  - python3 -m venv venv
  - source venv/bin/activate
  - pip install --upgrade pip
  - pip install google-cloud-storage

  # -----------------------------
  # Install Terraform
  # -----------------------------
  - curl -LO https://releases.hashicorp.com/terraform/1.6.0/terraform_1.6.0_linux_amd64.zip
  - unzip -o terraform_1.6.0_linux_amd64.zip
  - mv terraform /usr/local/bin/
  - terraform version

  # -----------------------------
  # Authenticate to GCP via Workload Identity Federation
  # -----------------------------
  - echo "$CI_JOB_JWT" > token.jwt
  - |
    cat > wif-config.json <<EOF
    {
      "type": "external_account",
      "audience": "//iam.googleapis.com/${WORKLOAD_IDENTITY_PROVIDER}",
      "token_url": "https://sts.googleapis.com/v1/token",
      "subject_token_type": "urn:ietf:params:oauth:token-type:jwt",
      "service_account_impersonate_url": "https://iamcredentials.googleapis.com/v1/projects/-/serviceAccounts/${GOOGLE_SERVICE_ACCOUNT}:generateAccessToken",
      "credential_source": {
        "file": "token.jwt"
      }
    }
    EOF
  - export GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/wif-config.json
  - gcloud config set project $GOOGLE_PROJECT
  - gcloud auth application-default print-access-token > /dev/null  # Verify authentication works

  # -----------------------------
  # Create backend bucket if not exists
  # -----------------------------
  - chmod +x $CI_PROJECT_DIR/terraform_project/scripts/backend_bucket/create_backend_bucket.sh
  - $CI_PROJECT_DIR/terraform_project/scripts/backend_bucket/create_backend_bucket.sh $TF_STATE_BUCKET

  # -----------------------------
  # Terraform init
  # -----------------------------
  - cd $CI_PROJECT_DIR/$TF_ROOT
  - terraform init -backend-config="bucket=$TF_STATE_BUCKET"

# -----------------------------
# Terraform validate
# -----------------------------
validate:
  stage: validate
  script:
    - terraform fmt -check
    - terraform validate

# -----------------------------
# Terraform plan
# -----------------------------
plan:
  stage: plan
  script:
    - terraform plan -out=tfplan
  artifacts:
    paths:
      - tfplan
  only:
    - merge_requests

# -----------------------------
# Terraform apply
# -----------------------------
apply:
  stage: apply
  dependencies:
    - plan
  script:
    # Re-authenticate in case of a new runner
    - echo "$CI_JOB_JWT" > token.jwt
    - |
      cat > wif-config.json <<EOF
      {
        "type": "external_account",
        "audience": "//iam.googleapis.com/${WORKLOAD_IDENTITY_PROVIDER}",
        "token_url": "https://sts.googleapis.com/v1/token",
        "subject_token_type": "urn:ietf:params:oauth:token-type:jwt",
        "service_account_impersonate_url": "https://iamcredentials.googleapis.com/v1/projects/-/serviceAccounts/${GOOGLE_SERVICE_ACCOUNT}:generateAccessToken",
        "credential_source": {
          "file": "token.jwt"
        }
      }
      EOF
    - export GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/wif-config.json
    - gcloud config set project $GOOGLE_PROJECT

    - terraform apply -auto-approve tfplan
  only:
    - main

# -----------------------------
# Terraform destroy
# -----------------------------
destroy:
  stage: destroy
  script:
    # Re-authenticate in case of a new runner
    - echo "$CI_JOB_JWT" > token.jwt
    - |
      cat > wif-config.json <<EOF
      {
        "type": "external_account",
        "audience": "//iam.googleapis.com/${WORKLOAD_IDENTITY_PROVIDER}",
        "token_url": "https://sts.googleapis.com/v1/token",
        "subject_token_type": "urn:ietf:params:oauth:token-type:jwt",
        "service_account_impersonate_url": "https://iamcredentials.googleapis.com/v1/projects/-/serviceAccounts/${GOOGLE_SERVICE_ACCOUNT}:generateAccessToken",
        "credential_source": {
          "file": "token.jwt"
        }
      }
      EOF
    - export GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/wif-config.json
    - gcloud config set project $GOOGLE_PROJECT

    - terraform destroy -auto-approve
  when: manual
  only:
    - main